<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register Page</title>
    <style>
        /* Colors used: #1a1a2e (dark navy), #e94560 (red), #ffffff (white), #f0f0f0 (light grey) */

        body {
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 5px;
        }

        p {
            color: grey;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 2px solid #f0f0f0;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #e94560;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #c73652;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #e94560;
            font-size: 14px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>📝 Register</h2>
        <p>Create a new account</p>

        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Choose a username" required>
            <input type="password" name="password" placeholder="Choose a password" required>
            <button type="submit">Register</button>
        </form>

        {% if message %}
        <div class="message {{ msg_type }}">{{ message }}</div>
        {% endif %}

        <hr>
        <a href="/login">Already have an account? Login here</a>
    </div>

</body>

</html>
